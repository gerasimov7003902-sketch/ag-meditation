<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>AG: Forests of Madness 2.0</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020504;
            font-family: 'Cinzel', 'Georgia', serif;
            color: #e6ca65;
        }
        /* Главный фон: Живая баба, которая плавно дышит */
        #bg-art {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
            opacity: 0.4;
            filter: contrast(1.3) brightness(0.5) grayscale(0.1);
            /* Замени ссылку ниже на свой арт с бабой, если нужно! */
            background-image: url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            /* Эффект глубокого, плавного дыхания */
            animation: breathing 6s infinite ease-in-out;
        }
        @keyframes breathing {
            0%, 100% { transform: scale(1.0); filter: contrast(1.3) brightness(0.4); }
            50% { transform: scale(1.04); filter: contrast(1.3) brightness(0.55); }
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            mix-blend-mode: screen;
        }
        #overlay-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px;
            pointer-events: none;
            text-align: center;
            background: radial-gradient(circle, rgba(2,5,4,0) 30%, rgba(2,5,4,0.85) 100%);
        }
        .brand-title {
            font-size: 24px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 300;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .center-instruction {
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #8fa89b;
            opacity: 0.7;
        }
        .action-call {
            font-size: 15px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #fffdf0;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            animation: pulse 2.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="bg-art"></div>
    
    <div id="overlay-ui">
        <div class="brand-title">AG: Forests of Madness 2.0</div>
        <div class="center-instruction">ВКЛЮЧИ ЗВУК И НАУШНИКИ</div>
        <div class="action-call">ТАПНИ ДЛЯ ВХОДА В ТРАНС</div>
    </div>

    <canvas id="meditationCanvas"></canvas>

    <script>
        const canvas = document.getElementById('meditationCanvas');
        const ctx = canvas.getContext('2d');
        const bgArt = document.getElementById('bg-art');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 🎵 ЗВУКОВОЙ ДВИЖОК БЕЗ ВНЕШНИХ ССЫЛОК (Синтезируем гипнотический эмбиент и птиц прямо кодом!)
        let audioCtx = null;
        let isAudioPlaying = false;

        function initHypnoAudio() {
            if (isAudioPlaying) return;
            
            // Создаем аудио-контекст
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 1. Глубокий шаманский гул (Бас-эмбиент)
            const osc = audioCtx.createOscillator();
            const gainOsc = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(55, audioCtx.currentTime); // Очень низкая частота 55 Гц
            gainOsc.gain.setValueAtTime(0.3, audioCtx.currentTime);
            
            // Модуляция гула, чтобы он "плавал"
            const lfo = audioCtx.createOscillator();
            const gainLfo = audioCtx.createGain();
            lfo.frequency.setValueAtTime(0.2, audioCtx.currentTime); // 0.2 Гц
            gainLfo.gain.setValueAtTime(15, audioCtx.currentTime);
            lfo.connect(gainLfo);
            gainLfo.connect(osc.frequency);
            
            osc.connect(gainOsc);
            gainOsc.connect(audioCtx.destination);
            osc.start();
            lfo.start();

            // 2. Генератор случайного щебета птиц во времени
            setInterval(() => {
                if (Math.random() > 0.4) spawnBirdSound();
            }, 2500);

            isAudioPlaying = true;
            document.querySelector('.action-call').style.display = 'none'; // Убираем призыв к тапу
        }

        function spawnBirdSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const birdOsc = audioCtx.createOscillator();
            const birdGain = audioCtx.createGain();
            
            birdOsc.type = 'sine';
            // Быстро прыгающая высокая частота, имитирующая порхание и свист птицы
            birdOsc.frequency.setValueAtTime(800 + Math.random() * 400, now);
            birdOsc.frequency.exponentialRampToValueAtTime(1500 + Math.random() * 500, now + 0.15);
            birdOsc.frequency.exponentialRampToValueAtTime(600 + Math.random() * 300, now + 0.3);
            
            birdGain.gain.setValueAtTime(0, now);
            birdGain.gain.linearRampToValueAtTime(0.04, now + 0.05);
            birdGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            
            birdOsc.connect(birdGain);
            birdGain.connect(audioCtx.destination);
            birdOsc.start();
            birdOsc.stop(now + 0.3);
        }

        // 💥 ВИЗУАЛЬНЫЙ ДВИЖОК: Круги и порхающие птицы-частицы
        const entities = [];

        class GoldWave {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 5;
                const maxDim = Math.max(canvas.width, canvas.height);
                this.maxRadius = Math.random() * (maxDim * 0.15) + (maxDim * 0.08); 
                this.lineWidth = Math.random() * 2 + 1;
                this.speed = Math.random() * 2 + 2; 
                this.alpha = 1;
                this.type = 'wave';
                this.color = 'rgba(255,215,0,';
            }
            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
            }
            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = this.color + this.alpha + ')';
                ctx.lineWidth = this.lineWidth;
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(255,215,0,0.4)';
                ctx.stroke();
                ctx.restore();
            }
        }

        // Класс порхающих чернильных птиц
        class ForestBird {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = -Math.random() * 3 - 2; // Летят вверх и вбок
                this.alpha = 1;
                this.size = Math.random() * 6 + 4;
                this.wingPhase = Math.random() * 10;
                this.type = 'bird';
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.wingPhase += 0.3;
                this.alpha -= 0.015; // Медленно тают в воздухе
            }
            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#ffd700';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffd700';
                
                // Рисуем силуэт порхающих крыльев
                ctx.beginPath();
                const wingSpread = Math.sin(this.wingPhase) * this.size;
                ctx.moveTo(this.x, this.y);
                ctx.quadraticCurveTo(this.x - this.size, this.y - wingSpread, this.x - this.size*1.5, this.y - this.size*0.5);
                ctx.quadraticCurveTo(this.x - this.size*0.5, this.y, this.x, this.y);
                ctx.quadraticCurveTo(this.x + this.size*0.5, this.y, this.x + this.size*1.5, this.y - this.size*0.5);
                ctx.quadraticCurveTo(this.x + this.size, this.y - wingSpread, this.x, this.y);
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerEffect(clientX, clientY) {
            // Включаем звук при первом клике
            initHypnoAudio();

            // Пускаем волны
            entities.push(new GoldWave(clientX, clientY));
            setTimeout(() => entities.push(new GoldWave(clientX, clientY)), 150);

            // Выпускаем стаю порхающих птиц из точки тапа
            for (let i = 0; i < 3; i++) {
