<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>AG: Forests of Madness 2.0</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020504;
            font-family: 'Cinzel', 'Georgia', serif;
            color: #e6ca65;
        }
        /* Живой фон: плавно дышит */
        #bg-art {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
            opacity: 0.15; /* Изначально темнее, пока не вошли */
            filter: contrast(1.3) brightness(0.4) grayscale(0.1);
            background-image: url('https://unsplash.com');
            background-size: cover;
            background-position: center;
        }
        /* Класс активного дыхания, включится после старта */
        .active-breath {
            animation: breathing 6s infinite ease-in-out !important;
        }
        @keyframes breathing {
            0%, 100 Tri-scale(1.0); filter: contrast(1.3) brightness(0.4); opacity: 0.35; }
            50% { transform: scale(1.04); filter: contrast(1.3) brightness(0.55); opacity: 0.45; }
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            mix-blend-mode: screen;
            display: none; /* Появится после старта */
        }
        /* Экран входа — чтобы обойти блокировки браузеров */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(2, 5, 4, 0.9);
            text-align: center;
            padding: 20px;
            cursor: pointer;
        }
        .brand-title {
            font-size: 26px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .btn-enter {
            padding: 15px 40px;
            border: 1px solid #e6ca65;
            background: transparent;
            color: #fffdf0;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(230, 202, 101, 0.2);
            transition: all 0.3s ease;
        }
        .btn-enter:hover {
            background: #e6ca65;
            color: #020504;
            box-shadow: 0 0 25px rgba(230, 202, 101, 0.6);
        }
    </style>
</head>
<body>

    <div id="bg-art"></div>
    
    <div id="start-screen" onclick="startMeditation()">
        <div class="brand-title">AG: Forests of Madness 2.0</div>
        <button class="btn-enter">ВОЙТИ В ТРАНС</button>
    </div>

    <canvas id="meditationCanvas"></canvas>

    <script>
        const canvas = document.getElementById('meditationCanvas');
        const ctx = canvas.getContext('2d');
        const bgArt = document.getElementById('bg-art');
        const startScreen = document.getElementById('start-screen');

        let audioCtx = null;
        const entities = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Запуск по клику на кнопку
        function startMeditation() {
            startScreen.style.display = 'none';
            canvas.style.display = 'block';
            bgArt.classList.add('active-breath');
            
            // Запускаем легальный звук без банов браузера
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const osc = audioCtx.createOscillator();
            const gainOsc = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(55, audioCtx.currentTime); 
            gainOsc.gain.setValueAtTime(0.25, audioCtx.currentTime);
            
            const lfo = audioCtx.createOscillator();
            const gainLfo = audioCtx.createGain();
            lfo.frequency.setValueAtTime(0.2, audioCtx.currentTime); 
            gainLfo.gain.setValueAtTime(12, audioCtx.currentTime);
            
            lfo.connect(gainLfo);
            gainLfo.connect(osc.frequency);
            osc.connect(gainOsc);
            gainOsc.connect(audioCtx.destination);
            
            osc.start();
            lfo.start();

            // Птички поют раз в 3 секунды
            setInterval(() => {
                if (audioCtx && Math.random() > 0.3) {
                    const now = audioCtx.currentTime;
                    const bOsc = audioCtx.createOscillator();
                    const bGain = audioCtx.createGain();
                    bOsc.type = 'sine';
                    bOsc.frequency.setValueAtTime(700 + Math.random() * 500, now);
                    bOsc.frequency.exponentialRampToValueAtTime(1400 + Math.random() * 400, now + 0.15);
                    bGain.gain.setValueAtTime(0, now);
                    bGain.gain.linearRampToValueAtTime(0.03, now + 0.05);
                    bGain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                    bOsc.connect(bGain);
                    bGain.connect(audioCtx.destination);
                    bOsc.start();
                    bOsc.stop(now + 0.3);
                }
            }, 3000);

            animate();
        }

        class GoldWave {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 5;
                const maxDim = Math.max(canvas.width, canvas.height);
                this.maxRadius = Math.random() * (maxDim * 0.15) + (maxDim * 0.08); 
                this.lineWidth = Math.random() * 2 + 1;
                this.speed = Math.random() * 2 + 2; 
                this.alpha = 1;
                this.type = 'wave';
            }
            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
            }
            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,215,0,' + this.alpha + ')';
                ctx.lineWidth = this.lineWidth;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ffd700';
                ctx.stroke();
                ctx.restore();
            }
        }

        class ForestBird {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = -Math.random() * 3 - 2; 
                this.alpha = 1;
                this.size = Math.random() * 6 + 4;
                this.wingPhase = Math.random() * 10;
                this.type = 'bird';
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.wingPhase += 0.3;
                this.alpha -= 0.015;
            }
            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#ffd700';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffd700';
                ctx.beginPath();
                const wing = Math.sin(this.wingPhase) * this.size;
                ctx.moveTo(this.x, this.y);
                ctx.quadraticCurveTo(this.x - this.size, this.y - wing, this.x - this.size * 1.5, this.y - this.size * 0.5);
                ctx.quadraticCurveTo(this.x - this.size * 0.5, this.y, this.x, this.y);
                ctx.quadraticCurveTo(this.x + this.size * 0.5, this.y, this.x + this.size * 1.5, this.y - this.size * 0.5);
                ctx.quadraticCurveTo(this.x + this.size, this.y - wing, this.x, this.y);
                ctx.fill();
                ctx.restore();
            }
        }

        function triggerEffect(clientX, clientY) {
            if (!audioCtx) return;
            entities.push(new GoldWave(clientX, clientY));
            for (let i = 0; i < 2; i++) {
                entities.push(new ForestBird(clientX, clientY));
            }
            bgArt.style.transform = `scale(1.02) translate(${(Math.random()-0.5)*6}px, ${(Math.random()-0.5)*6}px)`;
            setTimeout(() => { bgArt.style.transform = 'scale(1) translate(0,0)'; }, 300);
        }

        window.addEventListener('mousedown', (e) => { triggerEffect(e.clientX, e.clientY); });
        window.addEventListener('touchstart', (e) => {
            if (e.touches && e.touches.length > 0) {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    triggerEffect(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
                }
            }
        }, { passive: true });

        function animate() {
            ctx.fillStyle = 'rgba(2, 5, 4, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
