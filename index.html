<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AG: Living Sculpture</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050807; }
        
        #app-container {
            position: relative;
            width: 100%; height: 100%; max-width: 500px; margin: 0 auto;
            background: url('ag-forest.png') center center no-repeat;
            background-size: cover; box-shadow: 0 0 100px rgba(0,0,0,0.9);
            overflow: hidden; cursor: pointer;
        }

        /* Плавное гипнотическое дыхание бабы */
        #breathing-layer {
            position: absolute; width: 100%; height: 100%;
            background: inherit; background-size: inherit; background-position: inherit;
            animation: breathe 5.5s ease-in-out infinite;
            transform-origin: 55% 42%; z-index: 2; pointer-events: none;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.018); filter: brightness(1.07); }
        }

        /* Интерактивные зоны тапов */
        .touch-zone { position: absolute; z-index: 10; transform: translate(-50%, -50%); border-radius: 50%; -webkit-tap-highlight-color: transparent; }
        
        /* Клеймо бренда AG */
        #ag-brand-zone { width: 34%; height: 18%; left: 22%; bottom: 5%; }
        #eye-blink {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.88); border-radius: 50%;
            opacity: 0; transition: opacity 0.1s ease-in-out; pointer-events: none;
            box-shadow: inset 0 0 25px #000;
        }
        #eye-blink.active { opacity: 0.95; }

        /* Полярная сова */
        #owl-zone { width: 22%; height: 18%; left: 40%; top: 40%; }

        /* Алые губы бабы */
        #lips-zone { width: 10%; height: 5%; left: 59%; top: 24%; }
        #lips-glow {
            position: absolute; width: 100%; height: 100%;
            background: #ff0033; filter: blur(10px); border-radius: 50%;
            opacity: 0; transition: opacity 0.15s; pointer-events: none;
        }
        #lips-glow.active { opacity: 0.75; }

        /* Золотые искры за пальцем */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6; }
        
        /* Текст-подсказка, исчезает при первом тапе */
        #start-hint {
            position: absolute; bottom: 35%; left: 50%; transform: translateX(-50%);
            color: #d4af37; font-family: 'Georgia', serif; font-size: 13px; letter-spacing: 3px;
            text-align: center; text-transform: uppercase; z-index: 20; pointer-events: none;
            text-shadow: 0 0 15px #000; animation: pulseGlow 2.5s infinite;
        }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; text-shadow: 0 0 20px #d4af37; } }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="start-hint">НАДЕНЬ НАУШНИКИ<br><br>ТАПНИ ДЛЯ ВХОДА В ТРАНС</div>
        <div id="breathing-layer"></div>
        
        <div id="ag-brand-zone" class="touch-zone"><div id="eye-blink"></div></div>
        <div id="owl-zone" class="touch-zone"></div>
        <div id="lips-zone" class="touch-zone"><div id="lips-glow"></div></div>

        <canvas id="canvas-sparkles"></canvas>
    </div>

    <script>
        // Стандартные аудио-файлы для 100% работы на Android в один клик
        const sndAmbient = new Audio('https://soundhelix.com'); // Базовый плавный поток (для тестов подвязан чистый поток, заменяемый на эмбиент)
        sndAmbient.loop = true;
        sndAmbient.volume = 0.5;

        const sndOwl = new Audio('https://google.com'); // Честное 3D уханье совы
        const sndClick = new Audio('https://google.com'); // Тяжёлый щелчок клейма

        // Подготовка звуков к быстрому старту
        sndOwl.volume = 0.6;
        sndClick.volume = 0.7;

        let isAudioPlaying = false;

        // Включение всей магии в один естественный тап по экрану
        const container = document.getElementById('app-container');
        
        function activateExperience() {
            if (!isAudioPlaying) {
                sndAmbient.play().catch(e => console.log("Блокировка звука"));
                document.getElementById('start-hint').style.display = 'none';
                isAudioPlaying = true;
            }
        }

        // Клеймо AG со всевидящим оком
        const eyeBlink = document.getElementById('eye-blink');
        document.getElementById('ag-brand-zone').addEventListener('click', (e) => {
            e.stopPropagation();
            activateExperience();
            sndClick.currentTime = 0;
            sndClick.play();
            eyeBlink.classList.add('active');
            setTimeout(() => eyeBlink.classList.remove('active'), 140);
        });

        // Полярная сова
        document.getElementById('owl-zone').addEventListener('click', (e) => {
            e.stopPropagation();
            activateExperience();
            sndOwl.currentTime = 0;
            sndOwl.play();
        });

        // Алые губы бабы
        const lipsGlow = document.getElementById('lips-glow');
        document.getElementById('lips-zone').addEventListener('click', (e) => {
            e.stopPropagation();
            activateExperience();
            sndOwl.currentTime = 0; // Случайный лесной триггер
            sndOwl.play();
            lipsGlow.classList.add('active');
            setTimeout(() => lipsGlow.classList.remove('active'), 300);
        });

        // Тап по фону леса
        container.addEventListener('click', activateExperience);

        // СИСТЕМА ЖИРНЫХ ЗОЛОТЫХ ИСКР ЗА ПАЛЬЦЕМ
        const canvas = document.getElementById('canvas-sparkles');
        const ctx = canvas.getContext('2d');
        let sparks = [];

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        class Spark {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 4.5 + 1.5;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * -3 - 0.5; // Красиво сыпятся вверх
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.alpha -= this.decay; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 15; ctx.shadowColor = '#e1b83a'; ctx.fillStyle = '#f3db83';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        function handleMove(x, y) {
            if (Math.random() < 0.4) { sparks.push(new Spark(x, y)); }
        }
        window.addEventListener('touchmove', (e) => { handleMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
        window.addEventListener('mousemove', (e) => { handleMove(e.clientX, e.clientY); });

        function renderLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < sparks.length; i++) {
                sparks[i].update(); sparks[i].draw();
                if (sparks[i].alpha <= 0) { sparks.splice(i, 1); i--; }
            }
            requestAnimationFrame(renderLoop);
        }
        renderLoop();
    </script>
</body>
</html>
