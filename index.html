<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AG: Living Sculpture Meditation</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050807; font-family: 'Georgia', serif; }
        
        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: url('ag-forest.png') center center no-repeat;
            background-size: cover;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        /* Дыхание бабы и ткани */
        #breathing-layer {
            position: absolute; width: 100%; height: 100%;
            background: inherit; background-size: inherit; background-position: inherit;
            animation: breathe 5s ease-in-out infinite;
            transform-origin: 55% 40%; z-index: 2;
            pointer-events: none;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.015); filter: brightness(1.06); }
        }

        /* Кнопка-стартер на весь экран для обхода защиты Android */
        #audio-starter {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 100; cursor: pointer;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* НЛП-инструкция на старте */
        #hint-text {
            color: #d4af37; font-size: 14px; letter-spacing: 3px; text-align: center;
            text-transform: uppercase; padding: 20px; pointer-events: none;
            text-shadow: 0 0 15px #000; animation: pulseGlow 2.5s infinite;
        }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; text-shadow: 0 0 25px #d4af37; } }

        /* Интерактивные зоны */
        .touch-zone { position: absolute; cursor: pointer; z-index: 10; transform: translate(-50%, -50%); border-radius: 50%; display: block; -webkit-tap-highlight-color: transparent; }
        
        /* Клеймо AG со всевидящим оком */
        #ag-brand-zone { width: 36%; height: 20%; left: 22%; bottom: 4%; }
        #eye-blink {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); border-radius: 50%;
            opacity: 0; transition: opacity 0.1s ease-in-out; pointer-events: none;
            box-shadow: inset 0 0 20px #000;
        }
        #eye-blink.active { opacity: 0.95; }

        /* Зоны птиц для дофаминовой петли */
        #owl-zone { width: 20%; height: 18%; left: 40%; top: 40%; }
        #bird-top-left { width: 16%; height: 12%; left: 16%; top: 28%; }
        #bird-top-center { width: 18%; height: 14%; left: 34%; top: 7%; }
        #bird-top-right { width: 16%; height: 12%; left: 76%; top: 12%; }
        #bird-mid-right { width: 18%; height: 14%; left: 88%; top: 25%; }
        #bird-low-right { width: 16%; height: 12%; left: 80%; top: 52%; }

        /* Алые неоновые губы */
        #lips-zone { width: 8%; height: 4%; left: 59%; top: 24%; }
        #lips-glow {
            position: absolute; width: 100%; height: 100%;
            background: #ff0033; filter: blur(8px); border-radius: 50%;
            opacity: 0; transition: opacity 0.15s; pointer-events: none;
        }
        #lips-glow.active { opacity: 0.7; }

        /* Золотые искры за пальцем */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Главный включатель звука -->
        <div id="audio-starter">
            <div id="hint-text">НАДЕНЬ НАУШНИКИ.<br><br>ТАПНИ ПО ЭКРАНУ,<br>ЧТОБЫ ВОЙТИ В ТРАНС AG</div>
        </div>

        <!-- Слой живого дыхания -->
        <div id="breathing-layer"></div>
        
        <!-- Клеймо AG -->
        <div id="ag-brand-zone" class="touch-zone">
            <div id="eye-blink"></div>
        </div>
        
        <!-- Хор Птиц-Вестников -->
        <div id="owl-zone" class="touch-zone"></div>
        <div id="bird-top-left" class="touch-zone"></div>
        <div id="bird-top-center" class="touch-zone"></div>
        <div id="bird-top-right" class="touch-zone"></div>
        <div id="bird-mid-right" class="touch-zone"></div>
        <div id="bird-low-right" class="touch-zone"></div>
        
        <!-- Губы бабы -->
        <div id="lips-zone" class="touch-zone">
            <div id="lips-glow"></div>
        </div>

        <!-- Золотой холст искр -->
        <canvas id="canvas-sparkles"></canvas>
    </div>

    <script>
        let audioCtx = null;
        let ambientOsc = null;
        let ambientGain = null;
        let bL_osc = null, bR_osc = null;

        // Инициализация звука строго ПОСЛЕ реального клика
        function initAudioEngine() {
            if (audioCtx) return;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 1. Запуск низкого космического гула
            ambientOsc = audioCtx.createOscillator();
            ambientGain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            
            ambientOsc.type = 'sawtooth';
            ambientOsc.frequency.setValueAtTime(45, audioCtx.currentTime); // 45 Гц бас
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(80, audioCtx.currentTime);
            ambientGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            
            ambientOsc.connect(filter).connect(ambientGain).connect(audioCtx.destination);
            ambientOsc.start();

            // 2. Запуск бинаурального ритма (4.5 Гц для глубокого удержания)
            const merger = audioCtx.createChannelMerger(2);
            
            bL_osc = audioCtx.createOscillator();
            bL_osc.frequency.setValueAtTime(90, audioCtx.currentTime); // Левое ухо
            const gainL = audioCtx.createGain();
            gainL.gain.setValueAtTime(0.05, audioCtx.currentTime);
            bL_osc.connect(gainL).connect(merger, 0, 0);

            bR_osc = audioCtx.createOscillator();
            bR_osc.frequency.setValueAtTime(94.5, audioCtx.currentTime); // Правое ухо (разница 4.5 Гц)
            const gainR = audioCtx.createGain();
            gainR.gain.setValueAtTime(0.05, audioCtx.currentTime);
            bR_osc.connect(gainR).connect(merger, 0, 1);

            merger.connect(audioCtx.destination);
            bL_osc.start(); bR_osc.start();
        }

        // Случайные звуки птиц (дофаминовая петля)
        const birdFrequencies =;
        function triggerBirdSound(isOwl) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const isSecretTrig = Math.random() < 0.15; // 15% шанс на редкий мистический звук
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const panner = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;

            if (isOwl) {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            } else if (isSecretTrig) {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(45, audioCtx.currentTime + 0.7);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            } else {
                osc.type = 'sine';
                const randomFreq = birdFrequencies[Math.floor(Math.random() * birdFrequencies.length)];
                osc.frequency.setValueAtTime(randomFreq, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(randomFreq * 1.3, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            }

            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);

            if (panner) {
                panner.pan.setValueAtTime(Math.random() * 2 - 1, audioCtx.currentTime); // 3D-панорама
                osc.connect(panner).connect(gain).connect(audioCtx.destination);
            } else {
                osc.connect(gain).connect(audioCtx.destination);
            }

            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        }

        // Щелчок Всевидящего Ока
        function triggerEyeSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(75, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(20, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.16);
        }

        // Убийца защиты автоплея на Андроид
        const starter = document.getElementById('audio-starter');
        starter.addEventListener('click', function(e) {
            e.stopPropagation();
            initAudioEngine();
            starter.style.display = 'none'; // Убираем темную плашку, открываем арт
